name: Template for tests to remote runnter
run-name: ${{ github.actor }} is running.
on:
  workflow_dispatch: {}
#  schedule:
#    - cron: "0 0 * * 1"
# "Minute Hour DayOfMonth(1-31) Month(1-12) DayOfWeek(0-6)"

jobs:
  # This searches the framework repo for all available runners and submits all workflows to them.
  discover-runners:
    runs-on: ubuntu-latest  # Use GitHub-hosted for discovery
    outputs:
      runner-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Get Self-Hosted Runners
        id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Query GitHub API for self-hosted runners
          RUNNERS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
            | jq -c '[.runners[] | select(.status == "online") | .labels[] | select(.name != "self-hosted") | .name] | unique')
          
          echo "matrix=$RUNNERS" >> $GITHUB_OUTPUT
          echo "Found runners: $RUNNERS"

  test-run: # Name of test to run
    needs: discover-runners
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.discover-runners.outputs.runner-matrix) }}
    runs-on: [ self-hosted, ${ { matrix.runner } } ]
    steps:
      - uses: ./.github/actions/common-setup # This only installs the common software needed for the framework.

      # add installation steps needed for specific test
      - name: Install stuff
        shell: bash
        run: |
          echo "Install commands"

      # add steps to run the specific test
      - name: Run stuff
        id: runcall
        shell: bash
        run: |
          echo "Run commands"