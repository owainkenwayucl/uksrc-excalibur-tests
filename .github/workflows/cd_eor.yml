name: Deploy EoR Microbenchmark to runner
run-name: ${{ github.actor }} is running EoR Microbenchmark.
on:
  workflow_dispatch: {}
#  schedule:
#    - cron: "0 0 * * 1"
# "Minute Hour DayOfMonth(1-31) Month(1-12) DayOfWeek(0-6)"

jobs:
  # This searches the framework repo for all available runners and submits all workflows to them.
  discover-runners:
    runs-on: ubuntu-latest  # Use GitHub-hosted for discovery
    outputs:
      runner-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Get Self-Hosted Runners
        id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Query GitHub API for self-hosted runners
          RUNNERS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
            | jq -c '[.runners[] | select(.status == "online") | .labels[] | select(.name != "self-hosted") | .name] | unique')
          
          echo "matrix=$RUNNERS" >> $GITHUB_OUTPUT
          echo "Found runners: $RUNNERS"

  run-eor:
    needs: discover-runners
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.discover-runners.outputs.runner-matrix) }}
    runs-on: [ self-hosted, ${ { matrix.runner } } ]
    steps:
      - uses: ./.github/actions/common-setup
      - name: Run EoR Microbenchmark
        id: runcall
        # Run should contain all the lines of code in order to run the test
        shell: bash
        run: |
          export RFM_CONFIG_FILES="${PWD}/benchmarks/reframe_config.py"
          export RFM_USE_LOGIN_SHELL="true"
          export SPACK_ROOT=$(which spack)
          if [ -f "${SPACK_ROOT}/share/spack/setup-env.sh" ]; then
            source "${SPACK_ROOT}/share/spack/setup-env.sh"
          fi
          reframe -c ./benchmarks/apps/microbench-eor -n MicrobenchEOR --keep-stage-files -r