name: Deploy LOFARINT Microbenchmark to runner
run-name: ${{ github.actor }} is running LOFARINT Microbenchmark.
on:
  workflow_dispatch: {}
#  schedule:
#    - cron: "0 0 * * 1"
# "Minute Hour DayOfMonth(1-31) Month(1-12) DayOfWeek(0-6)"

jobs:
  # This searches the framework repo for all available runners and submits all workflows to them.
  discover-runners:
    runs-on: ubuntu-latest  # Use GitHub-hosted for discovery
    outputs:
      matrix: ${{ steps.runner-retrieval.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: runner-retrieval
        uses: ./.github/actions/runner-retrieval
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  run-lofarint: # Name of test to run
    needs: discover-runners
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-runners.outputs.matrix) }}
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/common-setup
      - name: Install Toil
        shell: bash
        run: |
          export TOIL_PATH=$(which toil-cwl-runner)
          if [ -z $TOIL_PATH ]; then
            pip install toil[cwl]
          fi
      - name: Install Apptainer
        shell: bash
        run: |
          export SINGULARITY_PATH=$(which singularity)
          if [ -z $SINGULARITY_PATH ]; then
            export APPTAINER_PATH=$(which apptainer)
            if [ -z $APPTAINER_PATH ]; then
              apt update
              apt install -y software-properties-common
              add-apt-repository -y ppa:apptainer/ppa
              apt update
              apt install -y apptainer
            fi
          fi
      - name: Run LOFARINT test
        id: runcall
        shell: bash
        run: |
          export RFM_CONFIG_FILES="${PWD}/benchmarks/reframe_config.py"
          export RFM_USE_LOGIN_SHELL="true"
          export SPACK_ROOT=$(which spack)
          if [ -f "${SPACK_ROOT}/share/spack/setup-env.sh" ]; then
            source "${SPACK_ROOT}/share/spack/setup-env.sh"
          fi
          reframe -c ./benchmarks/apps/microbench-lofarint -r